<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kailey Gomez – Graduation Party 🎓</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta property="og:title" content="You're Invited! Kailey Gomez Graduation Party">
  <meta property="og:description" content="Join us in celebrating Kailey's graduation — Saturday, May 30th, 2026 at 4pm · Ontario, CA">
  <meta property="og:image" content="https://www.kaileygomez.me/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@300;400&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 48px 20px;
      font-family: 'Cormorant Garamond', Georgia, serif;
    }

    .card {
      width: 520px;
      box-shadow: 0 30px 100px rgba(0, 0, 0, 0.95);
      overflow: hidden;
    }

    /* ═══ SCENE ═══ */
    .scene {
      position: relative;
      width: 520px;
      height: 360px;
      overflow: hidden;
    }

    /* ═══ TEXT SECTION ═══ */
    .text-section {
      background: #1a0035;
      padding: 38px 54px 52px;
      text-align: center;
    }

    .host-text {
      color: #c8a540;
      font-size: 20px;
      font-weight: 300;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      line-height: 2.2;
      margin-bottom: 28px;
    }

    .grad-name {
      display: block;
      font-family: 'Great Vibes', cursive;
      font-size: 58px;
      color: #d4a030;
      line-height: 1.15;
    }

    .rule {
      width: 70px;
      height: 1px;
      background: #c8a540;
      border: none;
      margin: 28px auto;
      opacity: 0.4;
    }

    .detail {
      color: #c8a540;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      line-height: 2.2;
      margin-bottom: 22px;
    }

    .reception {
      color: #c8a540;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2.8px;
      text-transform: uppercase;
      margin-top: 6px;
      opacity: 0.85;
    }

    .profile-image {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      object-position: 60% 30%;
      margin: 0 auto 20px;
      display: block;
      border: 2px solid #c8a540;
      box-shadow: 0 4px 15px rgba(200, 165, 64, 0.3);
    }

    .detail a {
      color: #c8a540;
      text-decoration: underline;
      opacity: 0.9;
      transition: opacity 0.3s ease;
    }

    .detail a:hover {
      opacity: 1;
    }

    .gifts-section {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(200, 165, 64, 0.3);
    }

    .gifts-title {
      color: #c8a540;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .gift-links {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .gift-link {
      display: inline-block;
      padding: 8px 14px;
      background: rgba(200, 165, 64, 0.1);
      border: 1px solid #c8a540;
      color: #c8a540;
      text-decoration: none;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 3px;
      transition: all 0.3s ease;
    }

    .gift-link:hover {
      background: rgba(200, 165, 64, 0.2);
      box-shadow: 0 2px 8px rgba(200, 165, 64, 0.2);
    }

    /* ═══ RSVP FORM ═══ */
    .rsvp-section {
      margin-top: 28px;
      padding-top: 22px;
      border-top: 1px solid rgba(200, 165, 64, 0.3);
    }

    .rsvp-title {
      color: #c8a540;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    .rsvp-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }

    .rsvp-form input,
    .rsvp-form select {
      width: 100%;
      background: rgba(200, 165, 64, 0.06);
      border: 1px solid rgba(200, 165, 64, 0.4);
      color: #c8a540;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      letter-spacing: 1.5px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.3s;
    }

    .rsvp-form input::placeholder {
      color: rgba(200, 165, 64, 0.45);
      letter-spacing: 1.5px;
    }

    .rsvp-form input:focus,
    .rsvp-form select:focus {
      border-color: #d4a030;
    }

    .rsvp-form select {
      appearance: none;
      cursor: pointer;
    }

    .rsvp-form select option {
      background: #1a0035;
    }

    .rsvp-submit {
      margin-top: 4px;
      padding: 11px 14px;
      background: rgba(200, 165, 64, 0.12);
      border: 1px solid #c8a540;
      color: #c8a540;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s ease;
      width: 100%;
    }

    .rsvp-submit:hover {
      background: rgba(200, 165, 64, 0.22);
      box-shadow: 0 2px 8px rgba(200, 165, 64, 0.2);
    }

    .rsvp-success {
      display: none;
      color: #c8a540;
      font-size: 16px;
      letter-spacing: 1.5px;
      text-align: center;
      padding: 12px 0 4px;
      opacity: 0.85;
    }

    /* ═══ MOBILE RESPONSIVE ═══ */
    @media (max-width: 600px) {
      body {
        padding: 24px 16px;
      }

      .card {
        width: 100%;
        max-width: 520px;
      }

      .scene {
        width: 100%;
        height: auto;
        aspect-ratio: 520 / 360;
      }

      .text-section {
        padding: 28px 24px 40px;
      }

      .host-text {
        font-size: 18px;
        margin-bottom: 20px;
      }

      .grad-name {
        font-size: 42px;
      }

      .detail {
        font-size: 15px;
        margin-bottom: 16px;
      }

      .reception {
        font-size: 14px;
      }

      .profile-image {
        width: 110px;
        height: 110px;
        margin: 0 auto 16px;
      }

      .gifts-title {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .gift-link {
        padding: 6px 10px;
        font-size: 13px;
        gap: 8px;
      }
    }

    @media (max-width: 400px) {
      .card {
        max-width: 100%;
      }

      .text-section {
        padding: 20px 16px 32px;
      }

      .grad-name {
        font-size: 36px;
      }

      .host-text {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

          <circle cx="475" cy="35" r="0.7" />
        </g>

        <!-- ══ CASTLE SILHOUETTE ══ -->
        <g fill="url(#castleGrad)">

          <!-- Ground / water base -->
          <rect x="0" y="335" width="520" height="25" />

          <!-- Far left landmass -->
          <polygon points="0,360 0,292 48,278 105,265 128,258 128,360" />
          <!-- Far right landmass -->
          <polygon points="520,360 520,292 472,278 415,265 392,258 392,360" />

          <!-- Main castle body -->
          <rect x="126" y="225" width="268" height="135" />

          <!-- ── Far-left outer tower ── -->
          <rect x="14" y="248" width="56" height="112" />
          <polygon points="42,158 14,248 70,248" />

          <!-- battlements -->
          <rect x="14" y="240" width="10" height="13" />

          <rect x="53" y="240" width="10" height="13" />

          <!-- ── Far-right outer tower ── -->
          <rect x="450" y="248" width="56" height="112" />
          <polygon points="478,158 450,248 506,248" />
          <polygon points="478,188 470,222 486,222" />
          <!-- battlements -->
          <rect x="450" y="240" width="10" height="13" />

          <!-- ── Left main tower ── -->
          <rect x="118" y="202" width="72" height="158" />

          <polygon points="170,148 158,202 182,202" />

          <rect x="118" y="194" width="10" height="13" />

          <rect x="170" y="194" width="10" height="13" />
          <rect x="183" y="194" width="10" height="13" />

          <!-- ── Right main tower ── -->
          <rect x="330" y="202" width="72" height="158" />
          <polygon points="366,88 330,202 402,202" />
          <polygon points="350,148 338,202 362,202" />
          <polygon points="382,148 370,202 394,202" />
          <!-- battlements -->
          <rect x="330" y="194" width="10" height="13" />
          <rect x="343" y="194" width="10" height="13" />

          <rect x="382" y="194" width="10" height="13" />
          <rect x="395" y="194" width="10" height="13" />

          <!-- ── Central grand tower ── -->
          <rect x="232" y="195" width="56" height="165" />

          <rect x="232" y="186" width="10" height="13" />

          <!-- ── Inner accent turrets ── -->
          <rect x="196" y="228" width="34" height="28" />

          <rect x="290" y="228" width="34" height="28" />

        <!-- Water shimmer lines -->
        <g stroke="#c8a540" stroke-width="0.6" opacity="0.12">
          <line x1="170" y1="342" x2="350" y2="342" />

      </svg>

      <!-- Lanterns -->
      <div id="lanterns" style="position:absolute;inset:0;pointer-events:none;"></div>
    </div>

    <!-- ══ TEXT SECTION ══ -->
    <div class="text-section">
      <p class="host-text">
        Join us in celebrating<br>
        the graduation of
      </p>

      <img src="kai.jpg" alt="Kailey Gomez" class="profile-image">

      <span class="grad-name">Kailey Gomez</span>

      <hr class="rule">

      <p class="detail">
        Saturday, May 30th, 2026<br>
        4 o'clock in the afternoon
      </p>

      <p class="detail">
        <a href="https://maps.google.com/?q=705+N+San+Antonio+Ave,+Ontario,+CA+91762" target="_blank" rel="noopener noreferrer">705 N San Antonio
          Ave<br>
          Ontario, CA 91762</a>
      </p>

      <p class="reception">RSVP: Marisella <a href="tel:9099765166" style="color:inherit;text-decoration:none;">909-976-5166</a></p>

      <div class="rsvp-section">
        <p class="rsvp-title">RSVP</p>
        <form name="rsvp" method="POST" data-netlify="true" class="rsvp-form" id="rsvp-form">
          <input type="hidden" name="form-name" value="rsvp">
          <input type="text" name="name" placeholder="Your Name" required>
          <select name="attending" required>
            <option value="" disabled selected>Attending?</option>
            <option value="yes">Yes, I'll be there</option>
            <option value="no">Sorry, can't make it</option>
          </select>
          <input type="number" name="guests" placeholder="Number of Guests" min="1" max="10">
          <input type="text" name="contact" placeholder="Phone or Email">
          <button type="submit" class="rsvp-submit">Send RSVP</button>
        </form>
        <p class="rsvp-success" id="rsvp-success">Thank you! We'll see you there. 🎓</p>
      </div>
    </div>

  </div>

  <style>
    @keyframes rise {
      0% {
        opacity: 0;
        transform: translateY(0) translateX(0);
      }

      8% {
        opacity: 1;
      }

      90% {
        opacity: 0.7;
      }

      100% {
        opacity: 0;
        transform: translateY(-340px) translateX(var(--dx));
      }
    }
  </style>

  <script>
    // Show inline success message after Netlify form submit
    const form = document.getElementById('rsvp-form');
    const success = document.getElementById('rsvp-success');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(form);
        await fetch('/', { method: 'POST', body: data });
        form.style.display = 'none';
        success.style.display = 'block';
      });
    }

    const wrap = document.getElementById('lanterns');
    const palette = [
      '#f5a623', '#f0c040', '#e87c2a',
      '#ffd27f', '#ffb347', '#ffe0a0', '#ffc86a', '#ff9944'
    ];

    for (let i = 0; i < 70; i++) {
      const size = Math.random() * 9 + 3;
      const left = Math.random() * 94 + 3;
      const bottom = Math.random() * 50 + 6;
      const delay = Math.random() * 14;
      const dur = Math.random() * 7 + 5;
      const dx = (Math.random() - 0.5) * 64;
      const color = palette[Math.floor(Math.random() * palette.length)];

      const el = document.createElement('div');
      el.style.cssText = `
      position: absolute;
      width: ${size}px;
      height: ${size}px;
      border-radius: 50%;
      background: ${color};
      box-shadow: 0 0 ${size * 2}px ${color}, 0 0 ${size * 5}px ${color}55;
      left: ${left}%;
      bottom: ${bottom}%;
      --dx: ${dx}px;
      animation: rise ${dur}s ${delay}s linear infinite;
    `;
      wrap.appendChild(el);
    }
  </script>

</body>

</html>
