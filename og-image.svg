<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7b1fa2"/>
      <stop offset="18%"  stop-color="#9c27b0"/>
      <stop offset="40%"  stop-color="#65008a"/>
      <stop offset="62%"  stop-color="#3a0058"/>
      <stop offset="82%"  stop-color="#180028"/>
      <stop offset="100%" stop-color="#0d1020"/>
    </linearGradient>
    <radialGradient id="atmo" cx="50%" cy="35%" r="55%">
      <stop offset="0%"   stop-color="#b040ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000"    stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="castleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#130820"/>
      <stop offset="100%" stop-color="#0a0415"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#atmo)"/>

  <!-- Stars -->
  <g fill="white" opacity="0.75">
    <circle cx="64"  cy="32"  r="1.6"/>
    <circle cx="155" cy="14"  r="1.2"/>
    <circle cx="258" cy="48"  r="1.8"/>
    <circle cx="370" cy="20"  r="1.1"/>
    <circle cx="452" cy="60"  r="1.5"/>
    <circle cx="555" cy="10"  r="1.2"/>
    <circle cx="648" cy="38"  r="1.8"/>
    <circle cx="740" cy="18"  r="1.1"/>
    <circle cx="835" cy="52"  r="1.6"/>
    <circle cx="928" cy="14"  r="1.3"/>
    <circle cx="1030" cy="36" r="1.8"/>
    <circle cx="1130" cy="24" r="1.4"/>
    <circle cx="110"  cy="80" r="1.1"/>
    <circle cx="218"  cy="95" r="1.5"/>
    <circle cx="328"  cy="72" r="1.2"/>
    <circle cx="510"  cy="88" r="1.4"/>
    <circle cx="805"  cy="78" r="1.1"/>
    <circle cx="990"  cy="96" r="1.6"/>
    <circle cx="1090" cy="65" r="1.2"/>
    <circle cx="180"  cy="130" r="1.0"/>
    <circle cx="430"  cy="115" r="1.3"/>
    <circle cx="700"  cy="125" r="1.1"/>
    <circle cx="960"  cy="118" r="1.4"/>
  </g>

  <!-- Castle silhouette -->
  <g fill="url(#castleGrad)">
    <!-- Ground -->
    <rect x="0" y="590" width="1200" height="40"/>
    <!-- Far-left landmass -->
    <polygon points="0,630 0,540 100,510 230,490 280,475 280,630"/>
    <!-- Far-right landmass -->
    <polygon points="1200,630 1200,540 1100,510 970,490 920,475 920,630"/>
    <!-- Castle base body -->
    <rect x="278" y="480" width="644" height="150"/>
    <!-- Far-left outer tower -->
    <rect x="40"  y="510" width="110" height="120"/>
    <polygon points="95,400 40,510 150,510"/>
    <rect x="40"  y="502" width="18" height="16"/>
    <rect x="66"  y="502" width="18" height="16"/>
    <rect x="92"  y="502" width="18" height="16"/>
    <rect x="118" y="502" width="18" height="16"/>
    <!-- Far-right outer tower -->
    <rect x="1050" y="510" width="110" height="120"/>
    <polygon points="1105,400 1050,510 1160,510"/>
    <rect x="1050" y="502" width="18" height="16"/>
    <rect x="1076" y="502" width="18" height="16"/>
    <rect x="1102" y="502" width="18" height="16"/>
    <rect x="1128" y="502" width="18" height="16"/>
    <!-- Left main tower -->
    <rect x="268" y="440" width="150" height="190"/>
    <polygon points="343,290 268,440 418,440"/>
    <polygon points="300,368 278,440 322,440"/>
    <polygon points="386,368 364,440 408,440"/>
    <rect x="268" y="430" width="18" height="16"/>
    <rect x="294" y="430" width="18" height="16"/>
    <rect x="320" y="430" width="18" height="16"/>
    <rect x="346" y="430" width="18" height="16"/>
    <rect x="372" y="430" width="18" height="16"/>
    <rect x="398" y="430" width="18" height="16"/>
    <!-- Right main tower -->
    <rect x="782" y="440" width="150" height="190"/>
    <polygon points="857,290 782,440 932,440"/>
    <polygon points="814,368 792,440 836,440"/>
    <polygon points="900,368 878,440 922,440"/>
    <rect x="782" y="430" width="18" height="16"/>
    <rect x="808" y="430" width="18" height="16"/>
    <rect x="834" y="430" width="18" height="16"/>
    <rect x="860" y="430" width="18" height="16"/>
    <rect x="886" y="430" width="18" height="16"/>
    <rect x="912" y="430" width="18" height="16"/>
    <!-- Central grand tower -->
    <rect x="548" y="430" width="104" height="200"/>
    <polygon points="600,220 548,430 652,430"/>
    <polygon points="572,330 550,430 594,430"/>
    <polygon points="628,330 606,430 650,430"/>
    <rect x="548" y="420" width="18" height="16"/>
    <rect x="574" y="420" width="18" height="16"/>
    <rect x="600" y="420" width="18" height="16"/>
    <rect x="626" y="420" width="18" height="16"/>
    <!-- Inner accent turrets -->
    <rect x="446" y="488" width="68" height="52"/>
    <polygon points="480,432 446,488 514,488"/>
    <rect x="686" y="488" width="68" height="52"/>
    <polygon points="720,432 686,488 754,488"/>
    <!-- Gate arch -->
    <rect x="562" y="522" width="76" height="108"/>
    <!-- Water shimmer -->
  </g>
  <g stroke="#c8a540" stroke-width="1" opacity="0.1">
    <line x1="360" y1="610" x2="840" y2="610"/>
    <line x1="400" y1="618" x2="800" y2="618"/>
  </g>

  <!-- Top decorative border -->
  <line x1="80" y1="48" x2="1120" y2="48" stroke="#c8a540" stroke-width="0.8" opacity="0.35"/>

  <!-- Text -->
  <text x="600" y="190" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="14" fill="#c8a540" letter-spacing="7" opacity="0.8">JOIN US IN CELEBRATING THE GRADUATION OF</text>

  <text x="600" y="310" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="108" font-style="italic"
        fill="#d4a030">Kailey Gomez</text>

  <line x1="440" y1="342" x2="760" y2="342" stroke="#c8a540" stroke-width="1.2" opacity="0.45"/>

  <text x="600" y="382" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="18" fill="#c8a540" letter-spacing="6">SATURDAY, MAY 30TH, 2026  ·  4 O'CLOCK</text>

  <text x="600" y="412" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="15" fill="#c8a540" letter-spacing="4" opacity="0.65">ONTARIO, CALIFORNIA</text>
</svg>
